<!DOCTYPE html>
<html lang="ja">
    <head>
        <title>練習第三課</title>
    </head>
    <body>
        <h1>
            俺の外国語ランク
        </h1>
        <ul>
            <li><b>ベトナム語</b></li>
            <li>英語</li>
            <li><i>日本語</i></li>
            <li>ロシア語</li>
        </ul>
        <ol>
            <li><b>ベトナム語</b>
                <ul>
                    <li>母語なんだから、ペラペラに使える。</li>
                    <li>日本から此の頃の使い違いって影響を受けて行くって感じる。</li>
                </ul>
            </li>
            <li>英語
                <ul>
                    <li>大学に入った時、学ぶ機会なんか無いからと言って、<sup>専攻関係資料にめっちゃ助かった。</sup></li>
                    <li><ins>外国人と喋れる。</ins></li>
                    <li>発音につき、大体苦手だ。</li>
                </ul>
            </li>
            <li><i>日本語</i></li>
            <li>ロシア語</li>
        </ol>
    </body>
</html>
